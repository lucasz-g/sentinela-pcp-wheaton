version: "3.9"

services:
  sentinela-pcp:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: sentinela-pcp
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000

      # POC/dev: sem banco e sem OAuth real
      JWT_SECRET: "poc-dev-secret"
      VITE_APP_ID: "sentinela-pcp"
      OAUTH_SERVER_URL: ""
      VITE_OAUTH_PORTAL_URL: ""

      VITE_ANALYTICS_ENDPOINT: "http://localhost:3000"
      VITE_ANALYTICS_WEBSITE_ID: "dev"

    volumes:
      - sentinela_uploads:/app/uploads

volumes:
  sentinela_uploads:
